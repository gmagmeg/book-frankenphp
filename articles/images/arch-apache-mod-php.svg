<svg width="560" height="180" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="a" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#555"/>
    </marker>
  </defs>
  <style>
    text { font-family: 'Hiragino Sans', 'Yu Gothic', 'Meiryo', sans-serif; fill: #222; }
  </style>

  <!-- ブラウザ -->
  <rect x="10" y="65" width="88" height="50" rx="4" fill="#d4d4d4" stroke="#777" stroke-width="1.5"/>
  <text x="54" y="87" text-anchor="middle" font-size="12">ブラウザ</text>
  <text x="54" y="104" text-anchor="middle" font-size="10" fill="#555">クライアント</text>

  <!-- HTTP arrow -->
  <line x1="98" y1="90" x2="140" y2="90" stroke="#555" stroke-width="1.5" marker-end="url(#a)"/>
  <text x="119" y="83" text-anchor="middle" font-size="10" fill="#555">HTTP</text>

  <!-- Apache process boundary -->
  <rect x="144" y="18" width="406" height="144" rx="6" fill="#f8f8f8" stroke="#aaa" stroke-width="1.5" stroke-dasharray="7,3"/>
  <text x="347" y="38" text-anchor="middle" font-size="11" fill="#999" font-style="italic">Apache プロセス</text>

  <!-- mod_php box (Webサーバー系: 濃) -->
  <rect x="164" y="52" width="148" height="78" rx="4" fill="#b8b8b8" stroke="#444" stroke-width="1.5"/>
  <text x="238" y="88" text-anchor="middle" font-size="14" font-weight="bold">mod_php</text>
  <text x="238" y="109" text-anchor="middle" font-size="11" fill="#444">PHP ランタイム</text>

  <!-- inner arrow -->
  <line x1="312" y1="91" x2="352" y2="91" stroke="#555" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- PHP app box (PHPアプリ: 淡) -->
  <rect x="356" y="52" width="178" height="78" rx="4" fill="#ebebeb" stroke="#888" stroke-width="1.5"/>
  <text x="445" y="88" text-anchor="middle" font-size="14" font-weight="bold">PHP アプリ</text>
  <text x="445" y="109" text-anchor="middle" font-size="11" fill="#555">（PHP コード）</text>
</svg>

<svg width="560" height="190" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="a" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#555"/>
    </marker>
  </defs>
  <style>
    text { font-family: 'Hiragino Sans', 'Yu Gothic', 'Meiryo', sans-serif; fill: #222; }
  </style>

  <!-- ブラウザ -->
  <rect x="10" y="70" width="88" height="50" rx="4" fill="#d4d4d4" stroke="#777" stroke-width="1.5"/>
  <text x="54" y="92" text-anchor="middle" font-size="12">ブラウザ</text>
  <text x="54" y="108" text-anchor="middle" font-size="10" fill="#555">クライアント</text>

  <!-- HTTP arrow -->
  <line x1="98" y1="95" x2="138" y2="95" stroke="#555" stroke-width="1.5" marker-end="url(#a)"/>
  <text x="118" y="88" text-anchor="middle" font-size="10" fill="#555">HTTP</text>

  <!-- FrankenPHP process boundary -->
  <rect x="142" y="18" width="408" height="154" rx="6" fill="#f8f8f8" stroke="#aaa" stroke-width="1.5" stroke-dasharray="7,3"/>
  <text x="346" y="38" text-anchor="middle" font-size="11" fill="#999" font-style="italic">FrankenPHP プロセス</text>

  <!-- Caddy + PHP Runtime box (Webサーバー系: 濃) -->
  <rect x="162" y="52" width="175" height="90" rx="4" fill="#b8b8b8" stroke="#444" stroke-width="1.5"/>
  <text x="249" y="88" text-anchor="middle" font-size="14" font-weight="bold">Caddy</text>
  <text x="249" y="108" text-anchor="middle" font-size="11" fill="#444">Web サーバー</text>
  <text x="249" y="128" text-anchor="middle" font-size="11" fill="#444">＋ PHP ランタイム</text>

  <!-- inner arrow -->
  <line x1="337" y1="97" x2="372" y2="97" stroke="#555" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- PHP app box (PHPアプリ: 淡) -->
  <rect x="376" y="52" width="158" height="90" rx="4" fill="#ebebeb" stroke="#888" stroke-width="1.5"/>
  <text x="455" y="93" text-anchor="middle" font-size="14" font-weight="bold">PHP アプリ</text>
  <text x="455" y="114" text-anchor="middle" font-size="11" fill="#555">（PHP コード）</text>
</svg>

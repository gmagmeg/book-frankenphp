<svg width="620" height="190" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="a" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#555"/>
    </marker>
  </defs>
  <style>
    text { font-family: 'Hiragino Sans', 'Yu Gothic', 'Meiryo', sans-serif; fill: #222; }
  </style>

  <!-- ブラウザ -->
  <rect x="10" y="70" width="82" height="50" rx="4" fill="#d4d4d4" stroke="#777" stroke-width="1.5"/>
  <text x="51" y="92" text-anchor="middle" font-size="12">ブラウザ</text>
  <text x="51" y="108" text-anchor="middle" font-size="10" fill="#555">クライアント</text>

  <!-- HTTP arrow -->
  <line x1="92" y1="95" x2="132" y2="95" stroke="#555" stroke-width="1.5" marker-end="url(#a)"/>
  <text x="112" y="88" text-anchor="middle" font-size="10" fill="#555">HTTP</text>

  <!-- Nginx process boundary -->
  <rect x="136" y="28" width="138" height="134" rx="6" fill="#f8f8f8" stroke="#aaa" stroke-width="1.5" stroke-dasharray="7,3"/>
  <text x="205" y="46" text-anchor="middle" font-size="11" fill="#999" font-style="italic">Nginx プロセス</text>

  <!-- Nginx box (Webサーバー系: 濃) -->
  <rect x="152" y="60" width="106" height="78" rx="4" fill="#b8b8b8" stroke="#444" stroke-width="1.5"/>
  <text x="205" y="97" text-anchor="middle" font-size="16" font-weight="bold">Nginx</text>
  <text x="205" y="118" text-anchor="middle" font-size="11" fill="#444">Web サーバー</text>

  <!-- FastCGI arrow (dashed) -->
  <line x1="274" y1="99" x2="318" y2="99" stroke="#555" stroke-width="1.5" stroke-dasharray="4,2" marker-end="url(#a)"/>
  <text x="296" y="89" text-anchor="middle" font-size="10" fill="#555">FastCGI</text>

  <!-- PHP-FPM process boundary -->
  <rect x="322" y="28" width="288" height="134" rx="6" fill="#f8f8f8" stroke="#aaa" stroke-width="1.5" stroke-dasharray="7,3"/>
  <text x="466" y="46" text-anchor="middle" font-size="11" fill="#999" font-style="italic">PHP-FPM プロセス</text>

  <!-- PHP-FPM box (PHPランタイム: 中) -->
  <rect x="338" y="60" width="118" height="78" rx="4" fill="#d4d4d4" stroke="#666" stroke-width="1.5"/>
  <text x="397" y="97" text-anchor="middle" font-size="14" font-weight="bold">PHP-FPM</text>
  <text x="397" y="118" text-anchor="middle" font-size="11" fill="#444">PHP ランタイム</text>

  <!-- inner arrow -->
  <line x1="456" y1="99" x2="482" y2="99" stroke="#555" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- PHP app box (PHPアプリ: 淡) -->
  <rect x="486" y="60" width="108" height="78" rx="4" fill="#ebebeb" stroke="#888" stroke-width="1.5"/>
  <text x="540" y="96" text-anchor="middle" font-size="13" font-weight="bold">PHP アプリ</text>
  <text x="540" y="116" text-anchor="middle" font-size="11" fill="#555">（PHP コード）</text>
</svg>
